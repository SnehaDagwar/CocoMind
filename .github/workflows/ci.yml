jobs:
  # ────────────────────────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff (lint)
        run: ruff check src/ tests/ --output-format=github

      - name: Run ruff (format check)
        run: ruff format --check src/ tests/

      - name: Run mypy --strict
        run: mypy src/ --strict --ignore-missing-imports

  # ────────────────────────────────────────────────────────────────────────────
  import-linter:
    name: Import Linter (Rule Engine Isolation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Enforce rule engine has no LLM imports
        run: lint-imports
        # Contract in pyproject.toml: src.engine cannot import anthropic/openai/langchain

  # ────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: >
          pytest tests/unit/
          -v
          --tb=short
          --cov=src
          --cov-report=xml
          --cov-report=term-missing
        env:
          AZURE_DOCINT_KEY: "stub-key"
          AZURE_DOCINT_ENDPOINT: "https://stub.cognitiveservices.azure.com/"
          ANTHROPIC_API_KEY: "stub-key"
          DATABASE_URL: "sqlite:///./test_audit.db"
          DSC_PKCS11_LIB: "/dev/null"

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────────────
  property-tests:
    name: Property Tests (Hypothesis — 250+ examples)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Hypothesis property suite
        run: >
          pytest tests/property/
          -v
          --tb=short
          --hypothesis-seed=0
        env:
          DATABASE_URL: "sqlite:///./test_audit.db"
          AZURE_DOCINT_KEY: "stub-key"
          AZURE_DOCINT_ENDPOINT: "https://stub.cognitiveservices.azure.com/"
          ANTHROPIC_API_KEY: "stub-key"
          DSC_PKCS11_LIB: "/dev/null"

  # ────────────────────────────────────────────────────────────────────────────
  red-team-tests:
    name: Red-Team Tests (Prompt Injection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run red-team suite (10 injection payloads)
        run: >
          pytest tests/red_team/
          -v
          --tb=short
          -m red_team
        env:
          DATABASE_URL: "sqlite:///./test_audit.db"
          AZURE_DOCINT_KEY: "stub-key"
          AZURE_DOCINT_ENDPOINT: "https://stub.cognitiveservices.azure.com/"
          ANTHROPIC_API_KEY: "stub-key"
          DSC_PKCS11_LIB: "/dev/null"

  # ────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Semgrep + Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep SAST
        run: |
          semgrep scan \
            --config=auto \
            --output=semgrep.sarif \
            --sarif \
            src/ || true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM (Syft)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: syft . -o cyclonedx-json=sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 90

  # ────────────────────────────────────────────────────────────────────────────
  e2e-pipeline:
    name: E2E Pipeline Test (Synthetic Bid Ground Truth)
    runs-on: ubuntu-latest
    needs: [unit-tests, property-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run E2E pipeline tests
        run: >
          pytest tests/e2e/
          -v
          --tb=short
          -m e2e
        env:
          DATABASE_URL: "sqlite:///./test_audit.db"
          AZURE_DOCINT_KEY: "stub-key"
          AZURE_DOCINT_ENDPOINT: "https://stub.cognitiveservices.azure.com/"
          ANTHROPIC_API_KEY: "stub-key"
          DSC_PKCS11_LIB: "/dev/null"
